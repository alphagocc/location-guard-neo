<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Location Guard Neo</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

    <meta name="theme-color" content="#f5f5f5">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/recipage@0.1.1/dist/recipage.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emojify.js@1.1.0/dist/css/sprites/emojify.css">

    <meta name="description" content="A UserScript that hide/spoof your geographic location from websites">

    <meta property="og:title" content="Location Guard Neo">
    <meta property="og:type" content="Website">
    <meta property="og:description" content="A UserScript that hide/spoof your geographic location from websites">
    <meta name="twitter:card" content="summary">
</head>
</head>

<body>
    <div id="location-guard-config-gui">
        <!-- <p style="padding: 16px; font-size: 18px; color: #445566;">
            <strong>You have not installed Location Guard yet.</strong>
        </p> -->
        <div id="app"></div>
    </div>
</body>

<script>
    window.$recipage = {
        url: 'https://cdn.jsdelivr.net/gh/Alphagocc/location-guard-neo@master/README.md',
        github: 'https://github.com/Alphagocc/location-guard-neo',
        footer: {
            title: 'Location Guard Neo'
        },
        ready: false,
        callback() {
            window.dispatchEvent(new CustomEvent('recipage-ready', { detail: '' }));
            window.$recipage.ready = true;
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/recipage@0.1.1"></script>

</html>
